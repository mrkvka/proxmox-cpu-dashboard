name: CI

on:
  push:
    branches: [master, 'cursor/**']
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Version file
        run: grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$' VERSION

      - name: Python tests
        run: |
          python3 -m py_compile src/pve-hw-collect.py src/pve-hw-apply.py
          python3 -m unittest discover -s tests -p 'test_*.py' -v

      - name: Perl module check
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libjson-perl
          test -f src/perl/PVE/API2/Nodes/Hardware.pm
          grep -q 'package PVE::API2::Nodes::Hardware' src/perl/PVE/API2/Nodes/Hardware.pm
          perl -e 'use JSON; use strict; use warnings; print "JSON + Hardware.pm present\n"'
          # Full `perl -c` needs Proxmox PVE::* modules — use scripts/verify-patch.sh on a PVE host

      - name: Shellcheck
        run: |
          sudo apt-get install -y shellcheck
          shellcheck -S error install.sh install-api.sh install-ui.sh uninstall*.sh scripts/*.sh src/patch-nodes.sh

      - name: Build both .deb packages
        run: |
          sudo apt-get install -y dpkg-dev
          bash scripts/build-deb.sh
          ls -la dist/proxmox-node-hw-api_*.deb dist/proxmox-node-hw-ui_*.deb
